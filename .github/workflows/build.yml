name: Build ProPOR+ - Production Point of Rental Plus Truck Loading

on:
  push:
    tags:
      - 'v*'           # Runs when you push a tag like v1.0.0
  workflow_dispatch:   # Also lets you trigger it manually from GitHub UI

jobs:
  build-mac:
    name: Build macOS
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build and publish macOS
        # --publish always: builds the app, generates latest-mac.yml, and uploads
        # everything (DMG, ZIP, latest-mac.yml) to the GitHub Release automatically.
        run: npx electron-builder --mac --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Skip code signing — app will work but macOS will warn first launch
          CSC_IDENTITY_AUTO_DISCOVERY: false

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build and publish Windows
        # --publish always: builds the app, generates latest.yml, and uploads
        # everything (EXE, latest.yml) to the GitHub Release automatically.
        run: npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # After both builds complete, publish the draft release so electron-updater can see it
  publish-release:
    name: Publish Release
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Publish draft release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '')
            const { data: releases } = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo
            })
            const release = releases.find(r => r.tag_name === tag && r.draft)
            if (release) {
              await github.rest.repos.updateRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release.id,
                draft: false,
                name: `ProPOR+ ${tag}`,
                body: `## ProPOR+ ${tag}\n\n### Download\n| Platform | File |\n|----------|------|\n| macOS | \`.dmg\` — drag to Applications |\n| Windows | \`.exe\` — run installer |\n\n### First Launch Note (macOS)\nRight-click the app → Open, then click Open to bypass Gatekeeper the first time.`
              })
              console.log(`Published release ${tag}`)
            } else {
              console.log('No draft release found for tag', tag)
            }
            - Inventory and case management
            - Event and crew planning
